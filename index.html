    const form = document.getElementById('unlockForm');
    const input = document.getElementById('passwordInput');
    const button = document.getElementById('unlockButton');
    const message = document.getElementById('message');

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function concatBytes(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const part of parts) {
        out.set(part, offset);
        offset += part.length;
      }
      return out;
    }

    function equalBytes(a, b) {
      if (a.length !== b.length) return false;
      let diff = 0;
      for (let i = 0; i < a.length; i++) diff |= a[i] ^ b[i];
      return diff === 0;
    }

    async function deriveKeys(password, salt) {
      const passwordKey = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        { name: 'PBKDF2', hash: 'SHA-256', salt, iterations: PAYLOAD.iterations },
        passwordKey,
        512
      );
      const material = new Uint8Array(bits);
      return {
        encKey: material.slice(0, 32),
        macKey: material.slice(32, 64)
      };
    }

    async function verifyMac(macKeyBytes, salt, iv, ciphertext, expectedMac) {
      const key = await crypto.subtle.importKey(
        'raw',
        macKeyBytes,
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      );
      const data = concatBytes([salt, iv, ciphertext]);
      const actual = new Uint8Array(await crypto.subtle.sign('HMAC', key, data));
      return equalBytes(actual, expectedMac);
    }

    async function unlock(password) {
      const salt = fromBase64(PAYLOAD.salt);
      const iv = fromBase64(PAYLOAD.iv);
      const ciphertext = fromBase64(PAYLOAD.ciphertext);
      const expectedMac = fromBase64(PAYLOAD.mac);
      const keys = await deriveKeys(password, salt);
      const ok = await verifyMac(keys.macKey, salt, iv, ciphertext, expectedMac);
      if (!ok) throw new Error('bad-password');
      const aesKey = await crypto.subtle.importKey(
        'raw',
        keys.encKey,
        { name: 'AES-CBC' },
        false,
        ['decrypt']
      );
      const plainBuffer = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, aesKey, ciphertext);
      const html = new TextDecoder().decode(plainBuffer);
      document.open();
      document.write(html);
      document.close();
      document.title = PAGE_TITLE;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      button.disabled = true;
      button.textContent = '正在验证...';
      try {
        await unlock(input.value);
      } catch (error) {
        message.textContent = '密码不正确，请重新输入。';
        input.select();
        button.disabled = false;
        button.textContent = '进入';
      }
    });
  </script>
